name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install Dependencies
        run: npm install --force
      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi
      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.asadullah.messmaster",
            "appName": "Mess Master",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF
          npx cap add android || true
          npx cap sync android
      - name: Set App Icon and Splash Screen
        run: |
          sudo apt-get install -y imagemagick
          RES_DIR="android/app/src/main/res"

          # icon.png নেই, তাই ImageMagick দিয়ে তৈরি করো
          convert -size 512x512 xc:"#1565C0" \
            -fill "#1E88E5" -draw "roundrectangle 30,30 482,482 60,60" \
            -fill white -font DejaVu-Sans-Bold -pointsize 100 \
            -gravity Center -annotate +0-60 "MESS" \
            -fill "#90CAF9" -font DejaVu-Sans-Bold -pointsize 70 \
            -gravity Center -annotate +0+60 "MASTER" \
            icon.png

          rm -rf $RES_DIR/mipmap-anydpi-v26
          mkdir -p $RES_DIR/mipmap-mdpi $RES_DIR/mipmap-hdpi $RES_DIR/mipmap-xhdpi $RES_DIR/mipmap-xxhdpi $RES_DIR/mipmap-xxxhdpi
          convert icon.png -resize 48x48   $RES_DIR/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 72x72   $RES_DIR/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 96x96   $RES_DIR/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 $RES_DIR/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 $RES_DIR/mipmap-xxxhdpi/ic_launcher.png
          convert icon.png -resize 48x48   $RES_DIR/mipmap-mdpi/ic_launcher_round.png
          convert icon.png -resize 72x72   $RES_DIR/mipmap-hdpi/ic_launcher_round.png
          convert icon.png -resize 96x96   $RES_DIR/mipmap-xhdpi/ic_launcher_round.png
          convert icon.png -resize 144x144 $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png
          convert icon.png -resize 192x192 $RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png
          mkdir -p $RES_DIR/drawable $RES_DIR/drawable-land-hdpi $RES_DIR/drawable-port-hdpi
          convert icon.png -resize 512x512 $RES_DIR/drawable/splash.png
          convert icon.png -resize 512x512 $RES_DIR/drawable-land-hdpi/splash.png
          convert icon.png -resize 512x512 $RES_DIR/drawable-port-hdpi/splash.png
      - name: Build Android APK
        run: |
          cd android
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MessMaster.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MessMaster-APK
          path: android/app/build/outputs/apk/debug/MessMaster.apk
